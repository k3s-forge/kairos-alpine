name: Build & Push tinycloud OCI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 2026.07.2)'
        required: true
        type: string
  push:
    tags: ['v*']

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Download build binaries
        run: |
          mkdir -p build/cni-plugins
          
          # Nebula v1.10.0
          curl -sSL -o nebula.tar.gz \
            "https://github.com/slackhq/nebula/releases/download/v1.10.0/nebula-linux-amd64.tar.gz"
          tar xzf nebula.tar.gz -C build/ nebula nebula-cert
          
          # Nomad v2.0.3+ent.musl (static musl build)
          curl -sSL -o nomad.zip \
            "https://releases.hashicorp.com/nomad/2.0.3+ent.musl/nomad_2.0.3+ent.musl_linux_amd64.zip"
          unzip -o nomad.zip -d build/ nomad
          
          # CNI plugins v1.6.2
          curl -sSL -o cni.tgz \
            "https://github.com/containernetworking/plugins/releases/download/v1.6.2/cni-plugins-linux-amd64-v1.6.2.tgz"
          tar xzf cni.tgz -C build/cni-plugins/
          
          ls -la build/ build/cni-plugins/

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate release.json
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          VERSION="${{ steps.version.outputs.version }}"
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          
          cat > release.json << JSONEOF
          {
            "schema": "transform.node-release/v1",
            "version": "${VERSION}",
            "kairos": {
              "version": "v3.21",
              "flavor": "alpine",
              "baseVersion": "3.21"
            },
            "image": {
              "oci": "ghcr.io/${{ github.repository }}",
              "digest": "${DIGEST}",
              "architectures": {
                "amd64": "${DIGEST}"
              },
              "verification": {
                "cosign": {
                  "issuer": "https://token.actions.githubusercontent.com",
                  "identity": "${{ github.server_url }}/${{ github.repository }}/.github/workflows/containerfile.yml@${{ github.ref }}"
                },
                "attestations": true,
                "sbom": "spdx-json"
              }
            },
            "provenance": {
              "repository": "${{ github.repository }}",
              "commit": "${{ github.sha }}",
              "workflow": "containerfile.yml",
              "runUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            },
            "minimumDiskGb": 10,
            "createdAt": "${NOW}"
          }
          JSONEOF
        shell: bash

      - name: Report digest
        run: |
          echo "## Image built" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Digest: \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: |
            ## tinycloud ${{ steps.version.outputs.version }}
            
            OCI: `ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}`
            Digest: `${{ steps.build.outputs.digest }}`
            
            Components:
            - Alpine 3.21
            - Nomad 2.0.3+ent.musl
            - Nebula 1.10.0
            - Podman + CNI 1.6.2
            - BIRD 2.15.1
          files: release.json
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
